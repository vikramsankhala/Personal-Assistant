# Render Blueprint - https://render.com/docs/blueprint-spec
# Connect repo at https://dashboard.render.com and use "New > Blueprint"
services:
  - type: web
    name: vpa-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: vpa-db
          property: connectionString
      - key: DATABASE_EXTERNAL_URL
        sync: false  # Required: paste External URL from vpa-db Connect menu (internal DNS fails on Render)
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: vpa-db
    plan: free
    region: oregon  # Must match web service region for internal DNS
